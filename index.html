<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>ジッケンクエスト ～誠実性12%の冒険～</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #111;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: 'MS Gothic', 'Courier New', monospace;
      overflow: hidden;
    }

    #gameContainer {
      position: relative;
      width: 100%;
      max-width: 640px;
      aspect-ratio: 4 / 3;
      image-rendering: pixelated;
    }

    canvas {
      width: 100%;
      height: 100%;
      display: block;
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      border: 4px solid #555;
      border-radius: 4px;
      box-shadow: 0 0 30px rgba(0, 100, 255, 0.3);
    }

    #ui {
      position: absolute;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%);
      color: #fff;
      font-size: 14px;
      text-align: center;
      text-shadow: 1px 1px 2px #000;
      pointer-events: none;
    }

    #msgBox {
      display: none;
      position: absolute;
      bottom: 20px;
      left: 20px;
      right: 20px;
      background: rgba(0, 0, 40, 0.92);
      border: 3px solid #fff;
      border-radius: 8px;
      color: #fff;
      padding: 16px 20px;
      font-size: 16px;
      line-height: 1.6;
      font-family: 'MS Gothic', 'Courier New', monospace;
      pointer-events: none;
      z-index: 100;
      white-space: pre-wrap;
    }

    #encounterFlash {
      display: none;
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: white;
      z-index: 50;
      pointer-events: none;
    }

    #title {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: url('title_screen.png') no-repeat center center;
      background-size: cover;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      align-items: center;
      color: #fff;
      z-index: 300;
      cursor: pointer;
      padding-bottom: 60px;
    }

    #title h1, #title h2 {
      display: none;
    }

    #title p {
      font-size: 18px;
      font-weight: bold;
      text-shadow: 2px 2px 4px #000;
      color: #88a;
      animation: blink 1.2s step-end infinite;
    }

    @keyframes glow {
      from {
        text-shadow: 2px 2px 0 #b8860b, 0 0 10px rgba(255, 215, 0, 0.3);
      }

      to {
        text-shadow: 2px 2px 0 #b8860b, 0 0 30px rgba(255, 215, 0, 0.7);
      }
    }

    @keyframes blink {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0;
      }
    }

    #controls {
      position: absolute;
      top: 10px;
      right: 10px;
      color: #556;
      font-size: 11px;
      pointer-events: none;
      z-index: 100;
    }

    /* スマホ用コントロール */
    #mobileControls {
      display: none; /* PCでは隠す */
      position: fixed;
      bottom: 10px;
      left: 0;
      width: 100%;
      z-index: 400;
      pointer-events: none; /* 下の要素のクリックを邪魔しないようにする */
    }
    @media (max-width: 800px) {
      #mobileControls {
        display: flex;
        justify-content: space-between;
        align-items: flex-end;
        padding: 0 20px;
      }
    }
    .dpad {
      position: relative;
      width: 150px;
      height: 150px;
    }
    .dpad-btn {
      position: absolute;
      width: 50px;
      height: 50px;
      background: rgba(255, 255, 255, 0.2);
      border: 2px solid rgba(255, 255, 255, 0.4);
      border-radius: 8px;
      pointer-events: auto; /* ボタン自体は押せるようにする */
    }
    .dpad-btn.up { top: 0; left: 50px; }
    .dpad-btn.down { bottom: 0; left: 50px; }
    .dpad-btn.left { top: 50px; left: 0; }
    .dpad-btn.right { top: 50px; right: 0; }
    .action-btns {
      display: flex;
      justify-content: flex-end;
      align-items: flex-end;
      padding-bottom: 20px;
    }
    .action-btn {
      width: 70px;
      height: 70px;
      background: rgba(255, 100, 100, 0.4);
      border: 2px solid rgba(255, 100, 100, 0.6);
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
      font-weight: bold;
      font-size: 24px;
      user-select: none;
      margin-left: 10px;
      pointer-events: auto; /* ボタン自体は押せるようにする */
    }
  </style>
</head>

    function makeTransparent(img) {
      if (!img.complete || img.naturalWidth === 0) return img;
      if (img.transparentCanvas) return img.transparentCanvas;

      const tCanvas = document.createElement('canvas');
      tCanvas.width = img.naturalWidth;
      tCanvas.height = img.naturalHeight;
      const tCtx = tCanvas.getContext('2d', { willReadFrequently: true });
      tCtx.drawImage(img, 0, 0);
      try {
        const imgData = tCtx.getImageData(0, 0, tCanvas.width, tCanvas.height);
        const data = imgData.data;
        if (data.length > 0) {
          // 四隅を起点にして背景色を塗りつぶし（Flood Fill）で透明化する
          let bgR = data[0], bgG = data[1], bgB = data[2];
          const width = tCanvas.width;
          const height = tCanvas.height;
          const visited = new Uint8Array(width * height);
          const q = [[0, 0], [width - 1, 0], [0, height - 1], [width - 1, height - 1]];
          let head = 0;

          while (head < q.length) {
            const pos = q[head++];
            const x = pos[0], y = pos[1];
            const vIdx = y * width + x;
            const idx = vIdx * 4;

            if (visited[vIdx]) continue;
            visited[vIdx] = 1;

            const r = data[idx], g = data[idx + 1], b = data[idx + 2];
            // 推定背景色に近い色を透明にする
            if (Math.abs(r - bgR) < 30 && Math.abs(g - bgG) < 30 && Math.abs(b - bgB) < 30) {
              data[idx + 3] = 0; // 透明化
              if (x > 0) q.push([x - 1, y]);
              if (x < width - 1) q.push([x + 1, y]);
              if (y > 0) q.push([x, y - 1]);
              if (y < height - 1) q.push([x, y + 1]);
            }
          }
          tCtx.putImageData(imgData, 0, 0);
        }
      } catch (e) {
        // file:/// アクセス等でCORSエラーになった場合はそのまま
      }
      img.transparentCanvas = tCanvas;
      return tCanvas;
    }

    // エンカウント設定
    let stepsSinceEncounter = 0;
    let nextEncounterSteps = Math.floor(Math.random() * 26) + 5; // 5～30歩

    function drawTile(mapX, mapY, dx, dy, type) {
      if (type === -1) {
        ctx.fillStyle = '#000'; ctx.fillRect(dx * TILE, dy * TILE, TILE, TILE);

      }

      const px = dx * TILE;
      const py = dy * TILE;

      // 1. ベースカラーの描画 (SFC風の落ち着いた色)
      ctx.fillStyle = TILE_COLORS[type] || '#000';
      ctx.fillRect(px, py, TILE, TILE);

      // 2. SFC風ドットテクスチャ (ノイズ) を全体にかける
      ctx.fillStyle = 'rgba(0,0,0,0.06)';
      for (let i = 0; i < 8; i++) {
        for (let j = 0; j < 8; j++) {
          if ((i + j) % 2 === 0) ctx.fillRect(px + j * 4, py + i * 4, 4, 4);
        }
      }

      // 3. タイルの境界にうっすら影を入れて立体感を出す（SFC特有のグリッド感）
      // ※ 水面(13)には立体影をつけないことで、水が箱のように浮き上がるのを防ぐ
      if (type !== 13) {
        ctx.fillStyle = 'rgba(0,0,0,0.15)';
        ctx.fillRect(px, py + TILE - 2, TILE, 2); // 下端の影

      }

      // 4. タイル種別ごとのオブジェクトの立体描画（ドット絵風3D描写）
      if (type === 0 || type === 10) {
        // 草 (風に揺れるようなドットの散布)

        ctx.fillStyle = '#5ba63c'; ctx.beginPath(); ctx.arc(px + 10, py + 10, 5, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = '#3a2010'; ctx.fillRect(px + 14, py + 24, 4, 8); // 幹

      } else if (type === 5) {

      } else if (type === 28) {

      } else if (type === 31) {

      } else if (type === 32) {

        ctx.fillStyle = '#222'; ctx.fillRect(px, py, TILE, TILE); // 背景の影
        ctx.fillStyle = '#eecc44'; ctx.fillRect(px + 4, py + 4, 24, 28); // 金の背もたれ
        ctx.fillStyle = '#aa2233'; ctx.fillRect(px + 8, py + 8, 16, 20); // 赤いクッション
        ctx.fillStyle = '#eecc44'; ctx.fillRect(px + 2, py + 16, 6, 6); ctx.fillRect(px + 24, py + 16, 6, 6); // 肘掛け

        ctx.fillStyle = '#ccaa22'; ctx.fillRect(px + 10, py + 6, 4, 6); ctx.fillStyle = '#aa3344'; ctx.fillRect(px + 16, py + 6, 6, 6); ctx.fillStyle = '#33aa55'; ctx.fillRect(px + 10, py + 14, 6, 12); ctx.fillStyle = '#ddccff'; ctx.fillRect(px + 18, py + 14, 4, 12); // ステンドグラス
      } else if (type === 4) {

        ctx.fillStyle = '#333333'; ctx.fillRect(px + 12, py + 20, 8, 8); // 門
        ctx.fillStyle = '#dd3333'; ctx.fillRect(px + 16, py + 2, 6, 4);  // 旗
      } else if (type === 15) {
        // フィールド村/町シンボル (小さな家々)
        ctx.fillStyle = '#aa8866'; ctx.fillRect(px + 4, py + 14, 10, 10); ctx.fillRect(px + 18, py + 16, 10, 8); // 壁
        ctx.fillStyle = '#883322'; ctx.beginPath(); ctx.moveTo(px + 2, py + 14); ctx.lineTo(px + 9, py + 8); ctx.lineTo(px + 16, py + 14); ctx.fill(); // 屋根1
        ctx.fillStyle = '#994433'; ctx.beginPath(); ctx.moveTo(px + 16, py + 16); ctx.lineTo(px + 23, py + 10); ctx.lineTo(px + 30, py + 16); ctx.fill(); // 屋根2
        ctx.fillStyle = '#eeeeee'; ctx.fillRect(px + 6, py + 18, 4, 4); ctx.fillRect(px + 20, py + 18, 4, 4); // 窓
      } else if (type === 20) {
        // フィールド砂漠シンボル (サボテン)
        ctx.fillStyle = '#e4cd99'; ctx.fillRect(px, py, TILE, TILE); // 砂地ベース書き直し
        ctx.fillStyle = '#22aa33'; ctx.fillRect(px + 12, py + 10, 6, 16); // サボテン胴体
        ctx.fillRect(px + 6, py + 14, 8, 4); ctx.fillRect(px + 6, py + 10, 4, 6); // 左腕
        ctx.fillRect(px + 16, py + 18, 8, 4); ctx.fillRect(px + 20, py + 12, 4, 8); // 右腕
        ctx.fillStyle = '#ccaa77'; ctx.fillRect(px + 4, py + 26, 24, 4); // 砂ボコリ
      } else if (type === 25) {
        // フィールド魔王城シンボル (禍々しい城)
        ctx.fillStyle = '#3a0256'; ctx.fillRect(px, py, TILE, TILE); // 紫ベース
        ctx.fillStyle = '#222222'; ctx.fillRect(px + 4, py + 8, 24, 20); // 黒い壁
        ctx.fillStyle = '#771122'; ctx.beginPath(); ctx.moveTo(px + 4, py + 8); ctx.lineTo(px + 16, py + 0); ctx.lineTo(px + 28, py + 8); ctx.fill(); // 紅い尖塔
        ctx.fillStyle = '#ff0000'; ctx.fillRect(px + 12, py + 14, 2, 4); ctx.fillRect(px + 18, py + 14, 2, 4); // 不気味な光
      } else if (type === 13) {
        // 水面 (アニメーションする柔らかい白波)
        const wave = Math.sin(Date.now() / 600 + mapX) * 3;
        ctx.fillStyle = 'rgba(255,255,255,0.3)'; ctx.fillRect(px + 4 + wave, py + 8, 8, 2);
        ctx.fillStyle = 'rgba(255,255,255,0.5)'; ctx.fillRect(px + 16 - wave, py + 20, 6, 2);
      } else if (type === 16) {
        // 洞窟 (入り口の立体感)
        ctx.fillStyle = '#5c5248'; ctx.beginPath(); ctx.arc(px + 16, py + 20, 14, Math.PI * 1.2, Math.PI * 2.8); ctx.fill();
        ctx.fillStyle = '#0a0a0a'; ctx.beginPath(); ctx.arc(px + 16, py + 24, 8, Math.PI, Math.PI * 2); ctx.fill();
        ctx.fillRect(px + 8, py + 24, 16, 8); // 暗闇の奥
      } else if (type === 17) {

        ctx.fillStyle = '#e0e4e8'; ctx.fillRect(px + 6, py + 10, 20, 22);
        ctx.fillStyle = '#aeb5bc'; ctx.fillRect(px + 22, py + 10, 4, 22); // 影
        ctx.fillStyle = '#1ca386'; ctx.beginPath(); ctx.moveTo(px + 2, py + 10); ctx.lineTo(px + 16, py - 2); ctx.lineTo(px + 30, py + 10); ctx.fill(); // 緑の屋根
        ctx.fillStyle = '#fcefb4'; ctx.fillRect(px + 14, py + 18, 4, 4); // 光る水晶
      } else if (type === 18) {
        // 迷いの森シンボル（怪しい紫の木）
        ctx.fillStyle = '#1d3a1e'; ctx.beginPath(); ctx.arc(px + 16, py + 16, 14, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = '#2d5a2e'; ctx.beginPath(); ctx.arc(px + 10, py + 10, 10, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = '#4a205a'; ctx.fillRect(px + 14, py + 24, 4, 8); // 幹
        ctx.fillStyle = '#ff00ff'; ctx.fillRect(px + 10, py + 14, 2, 2); ctx.fillRect(px + 18, py + 14, 2, 2); // 光る目
        ctx.fillStyle = 'rgba(50,0,80,0.4)'; ctx.fillRect(px, py, 32, 32); // 紫のモヤ
      } else if (type === 35) {

        ctx.fillStyle = '#b07040'; ctx.fillRect(px, py, TILE, TILE); // ベースの色
        ctx.strokeStyle = '#804020'; ctx.lineWidth = 1;
        ctx.beginPath();

        ctx.moveTo(px + 10, py); ctx.lineTo(px + 10, py + 8);

        ctx.moveTo(px + 16, py + 16); ctx.lineTo(px + 16, py + 24);
        ctx.moveTo(px + 8, py + 24); ctx.lineTo(px + 8, py + 32);

      } else if (type === 36) {

        ctx.fillStyle = '#222'; ctx.fillRect(px, py, TILE, TILE); // 黒い塗りつぶし
        ctx.fillStyle = '#666'; ctx.fillRect(px + 4, py + 4, 24, 24); // 上部のグレー
        ctx.strokeStyle = '#111'; ctx.lineWidth = 1; ctx.strokeRect(px + 4, py + 4, 24, 24);
      } else if (type === 37) {

        ctx.fillStyle = '#b07040'; ctx.fillRect(px, py, TILE, TILE); // 下地の床
        ctx.fillStyle = '#6c4a31'; ctx.fillRect(px, py + 8, TILE, 16); // 机の天板
        ctx.fillStyle = '#4a2c11'; ctx.fillRect(px, py + 24, TILE, 8); // 机の前側面の影

        ctx.fillStyle = '#b07040'; ctx.fillRect(px, py, TILE, TILE); // 下地の床

        ctx.fillStyle = '#b07040'; ctx.fillRect(px, py, TILE, TILE); // 下地の床
        ctx.fillStyle = '#5c4029'; ctx.fillRect(px + 2, py + 2, 28, 30); // 棚枠

        ctx.fillStyle = '#5c4029'; ctx.fillRect(px + 4, py + 16, 24, 2); // 中段

    function drawPlayer(dx, dy) {
      const x = dx * TILE;
      const y = dy * TILE;
      const bounce = player.moving ? Math.sin(Date.now() / 150) * 3 : 0;
      const walkCycle = player.moving ? Math.sin(Date.now() / 150) : 0;

      // 方向に応じてキーを切り替え (0:上(後), 1:下(前), 2:左(横), 3:右(横反転))
      let spriteKey = 'playerFrontImg';
      if (player.dir === 0) spriteKey = 'playerBackImg';
      else if (player.dir === 1) spriteKey = 'playerFrontImg';
      else if (player.dir === 2 || player.dir === 3) spriteKey = 'playerSideImg';

      const playerImg = charImgs[PLAYER_DIR_MAP[spriteKey]];
      if (isImgReady(playerImg)) {
        // 影
        ctx.fillStyle = 'rgba(0,0,0,0.5)';
        ctx.beginPath(); ctx.ellipse(x + 16, y + 28, 12, 5, 0, 0, Math.PI * 2); ctx.fill();

        if (player.dir === 2) {
          ctx.save();
          ctx.translate(x + 16, y + 16);
          ctx.scale(-1, 1);
          ctx.drawImage(playerImg, 0, 0, playerImg.naturalWidth, playerImg.naturalHeight, -18, -20 + bounce, 36, 36);
          ctx.restore();
        } else {
          ctx.drawImage(playerImg, 0, 0, playerImg.naturalWidth, playerImg.naturalHeight, x - 2, y - 4 + bounce, 36, 36);
        }
      } else {
        // SFC DQ6風 リッチプロポーション・ドット絵
        // 影
        ctx.fillStyle = 'rgba(0,0,0,0.5)';
        ctx.beginPath(); ctx.ellipse(x + 16, y + 28, 12, 5, 0, 0, Math.PI * 2); ctx.fill();

        // 脚 (黒いズボン＋靴)
        ctx.fillStyle = '#222';
        ctx.fillRect(x + 10, y + 22 + bounce + (walkCycle > 0 ? 3 : 0), 5, 8);
        ctx.fillRect(x + 17, y + 22 + bounce + (walkCycle < 0 ? 3 : 0), 5, 8);
        ctx.fillStyle = '#3a3a3a'; // 靴のハイライト
        ctx.fillRect(x + 10, y + 28 + bounce + (walkCycle > 0 ? 3 : 0), 5, 2);
        ctx.fillRect(x + 17, y + 28 + bounce + (walkCycle < 0 ? 3 : 0), 5, 2);

        // トレンチ風 白衣 (SFC風の陰影つき)
        ctx.fillStyle = '#eeeeee';
        ctx.fillRect(x + 6, y + 10 + bounce, 20, 14);
        ctx.fillStyle = '#cccccc'; // 白衣の影
        ctx.fillRect(x + 22, y + 12 + bounce, 4, 12);
        ctx.fillRect(x + 6, y + 12 + bounce, 4, 12);

        // 黒いパーカー（インナー）
        ctx.fillStyle = '#1a1a1a';
        ctx.fillRect(x + 12, y + 9 + bounce, 8, 12);
        // フード部分
        ctx.fillRect(x + 8, y + 8 + bounce, 16, 4);

        // 腕（白衣の袖）
        ctx.fillStyle = '#dddddd';
        ctx.fillRect(x + 2, y + 12 + bounce + (walkCycle < 0 ? -2 : 0), 6, 9);
        ctx.fillRect(x + 24, y + 12 + bounce + (walkCycle > 0 ? -2 : 0), 6, 9);

        // 手
        ctx.fillStyle = '#ffe0cc';
        ctx.fillRect(x + 3, y + 21 + bounce + (walkCycle < 0 ? -2 : 0), 4, 4);
        ctx.fillRect(x + 25, y + 21 + bounce + (walkCycle > 0 ? -2 : 0), 4, 4);

        // スマホ (片手に持っている)
        if (player.dir === 1 || player.dir === 2) {
          ctx.fillStyle = '#445566'; // スマホ背面
          ctx.fillRect(x + 1, y + 18 + bounce + (walkCycle < 0 ? -2 : 0), 6, 8);
          ctx.fillStyle = '#aaddff'; // 画面の光
          ctx.fillRect(x + 2, y + 19 + bounce + (walkCycle < 0 ? -2 : 0), 4, 4);
        }

        // 頭
        ctx.fillStyle = '#ffe0cc'; // 肌色
        ctx.fillRect(x + 7, y - 4 + bounce, 18, 15);

        // 無造作な黒髪 (SFC風ボリュームUP)
        ctx.fillStyle = '#2b2e33'; // 黒寄りのグレーベース
        ctx.fillRect(x + 4, y - 10 + bounce, 24, 10);
        ctx.fillRect(x + 6, y - 12 + bounce, 20, 4);
        ctx.fillRect(x + 2, y - 4 + bounce, 6, 12); // 左サイド
        ctx.fillRect(x + 24, y - 4 + bounce, 6, 12); // 右サイド

        // 髪のハイライト
        ctx.fillStyle = '#4a4e54';
        ctx.fillRect(x + 8, y - 9 + bounce, 6, 2);
        ctx.fillRect(x + 18, y - 9 + bounce, 4, 2);

        // アホ毛
        ctx.fillRect(x + 12, y - 14 + bounce, 4, 4);
        ctx.fillRect(x + 16, y - 16 + bounce, 2, 4);

        // 顔（ジト目・隈）
        if (player.dir === 1) { // 下
          // 目の下の隈
          ctx.fillStyle = '#dda8a8';
          ctx.fillRect(x + 10, y + 4 + bounce, 5, 2);
          ctx.fillRect(x + 17, y + 4 + bounce, 5, 2);

          // ジト目 (半開き)
          ctx.fillStyle = '#111';
          ctx.fillRect(x + 10, y + 2 + bounce, 4, 2);
          ctx.fillRect(x + 18, y + 2 + bounce, 4, 2);
          // 白目
          ctx.fillStyle = '#fff';
          ctx.fillRect(x + 10, y + 3 + bounce, 1, 1);
          ctx.fillRect(x + 18, y + 3 + bounce, 1, 1);

          // 口 (少しへの字)
          ctx.fillStyle = '#cc8888';
          ctx.fillRect(x + 14, y + 7 + bounce, 4, 1);
        } else if (player.dir === 2) { // 左
          ctx.fillStyle = '#dda8a8'; ctx.fillRect(x + 6, y + 4 + bounce, 5, 2); // 隈
          ctx.fillStyle = '#111'; ctx.fillRect(x + 6, y + 2 + bounce, 4, 2); // 目
          ctx.fillStyle = '#fff'; ctx.fillRect(x + 6, y + 3 + bounce, 1, 1);
        } else if (player.dir === 3) { // 右
          ctx.fillStyle = '#dda8a8'; ctx.fillRect(x + 21, y + 4 + bounce, 5, 2); // 隈
          ctx.fillStyle = '#111'; ctx.fillRect(x + 22, y + 2 + bounce, 4, 2); // 目
          ctx.fillStyle = '#fff'; ctx.fillRect(x + 25, y + 3 + bounce, 1, 1);
        }
      }
    }

    function drawNPC(npc, dx, dy) {
      if (npc.id === 'boss1' && flags.hajime_boss_defeated) return;
      if (npc.id === 'boss2' && flags.nemuri_boss_defeated) return;
      if (npc.id === 'boss3' && flags.forest_boss_defeated) return;
      if (npc.id === 'boss4' && flags.desert_boss_defeated) return;
      if (npc.id === 'boss5' && flags.snow_boss_defeated) return;
      if (npc.id === 'boss6' && flags.cave_boss_defeated) return;
      if (npc.id === 'boss7' && flags.shrine_boss_defeated) return;
      if (npc.id === 'demon_king' && flags.demon_defeated) return;

      const x = dx * TILE;
      const y = dy * TILE;
      const bounce = Math.sin(Date.now() / 300 + npc.x) * 1;

      if (['boss1', 'boss2', 'boss3', 'boss4', 'boss5', 'boss6', 'boss7', 'demon_king'].includes(npc.id)) {
        const demonImg = charImgs['npc_demonking'];
        if (npc.id === 'demon_king' && isImgReady(demonImg)) {
          // 魔王の特別グラフィック（個別画像からデカく描画）
          ctx.fillStyle = 'rgba(0,0,0,0.4)'; ctx.beginPath(); ctx.ellipse(x + 16, y + 28, 14, 6, 0, 0, Math.PI * 2); ctx.fill();
          // 64x64に拡大して描画
          ctx.drawImage(demonImg, 0, 0, demonImg.naturalWidth, demonImg.naturalHeight, x - 16, y - 24 + bounce, 64, 64);
        } else {
          ctx.fillStyle = 'rgba(0,0,0,0.4)'; ctx.beginPath(); ctx.ellipse(x + 16, y + 28, 12, 6, 0, 0, Math.PI * 2); ctx.fill();
          const aura = ctx.createRadialGradient(x + 16, y + 16, 2, x + 16, y + 16, 20);
          let col = '#ff00ff';
          if (npc.id === 'boss2') col = '#0000ff';
          if (npc.id === 'boss3') col = '#00ff00';
          if (npc.id === 'boss4') col = '#ffaa00';
          if (npc.id === 'boss5') col = '#ccccff';
          if (npc.id === 'boss6') col = '#aaaaaa';
          if (npc.id === 'boss7') col = '#bb6633';
          if (npc.id === 'demon_king') col = '#ff0000'; // 禍々しい赤黒
          aura.addColorStop(0, col);
          aura.addColorStop(1, 'rgba(80,0,80,0)');
          ctx.fillStyle = aura;
          ctx.fillRect(x - 4, y - 4, 40, 40);

          ctx.fillStyle = '#111'; ctx.fillRect(x + 12, y + 12 + bounce, 3, 2); ctx.fillRect(x + 18, y + 12 + bounce, 3, 2);
          ctx.fillStyle = '#ff0000'; ctx.fillRect(x + 12, y + 12 + bounce, 1, 1); ctx.fillRect(x + 18, y + 12 + bounce, 1, 1);
        }
        return;
      }

      const npcFileName = npc.img ? IMG_MAP[npc.img] : null;
      const npcImg = npcFileName ? charImgs[npcFileName] : null;
      if (npcImg && isImgReady(npcImg)) {
        // 高品質な新規画像がある場合
        ctx.fillStyle = 'rgba(0,0,0,0.4)'; ctx.beginPath(); ctx.ellipse(x + 16, y + 28, 10, 4, 0, 0, Math.PI * 2); ctx.fill();
        
        // 大臣と姫は威厳を出すために大きく描画する
        let drawSize = 36;
        let offsetX = -2;
        let offsetY = -4;
        
        if (npc.id === 'chancellor' || npc.id === 'princess') {
          drawSize = 48;
          offsetX = -8;
          offsetY = -16;
        }

        ctx.drawImage(npcImg, 0, 0, npcImg.naturalWidth, npcImg.naturalHeight, x + offsetX, y + offsetY + bounce, drawSize, drawSize);
      } else {
        // ドット絵風の人間らしいプロポーションでNPCを描画
        // 影
        ctx.fillStyle = 'rgba(0,0,0,0.3)';
        ctx.beginPath(); ctx.ellipse(x + 16, y + 26, 10, 4, 0, 0, Math.PI * 2); ctx.fill();

        // 脚
        ctx.fillStyle = '#222';
        ctx.fillRect(x + 10, y + 22 + bounce, 4, 6);
        ctx.fillRect(x + 18, y + 22 + bounce, 4, 6);

        // 体
        ctx.fillStyle = npc.color || '#ff0000';
        ctx.fillRect(x + 8, y + 10 + bounce, 16, 12);

        // 腕
        ctx.fillStyle = npc.color || '#ff0000';
        ctx.fillRect(x + 4, y + 10 + bounce, 4, 8);
        ctx.fillRect(x + 24, y + 10 + bounce, 4, 8);

        // 頭 (素肌)
        ctx.fillStyle = '#ffccaa';
        ctx.fillRect(x + 6, y - 4 + bounce, 20, 16);

        // 髪の毛
        ctx.fillStyle = npc.hairColor || '#442211';
        ctx.fillRect(x + 4, y - 6 + bounce, 24, 6);
        ctx.fillRect(x + 4, y - 4 + bounce, 4, 12);
        ctx.fillRect(x + 24, y - 4 + bounce, 4, 12);

        // 目
        ctx.fillStyle = '#111';
        ctx.fillRect(x + 10, y + 2 + bounce, 4, 4);
        ctx.fillRect(x + 18, y + 2 + bounce, 4, 4);
        // ハイライト
        ctx.fillStyle = '#fff';
        ctx.fillRect(x + 12, y + 2 + bounce, 2, 2);
        ctx.fillRect(x + 20, y + 2 + bounce, 2, 2);
      }

      // 名前ラベル (少し上にずらし、背景を広げて読みやすくする)
      ctx.fillStyle = 'rgba(0,0,0,0.6)'; ctx.fillRect(x - 8, y - 26 + bounce, 48, 14);
      ctx.fillStyle = '#fff'; ctx.font = '10px monospace'; ctx.textAlign = 'center'; ctx.fillText(npc.name, x + 16, y - 15 + bounce);
    }

    // ========== システム機能 ==========
    function showMsg(text, callback = null, isAuto = false) {
      msgText = text;
      // isAutoがfalseの場合は-1（無限）に設定して、キー入力があるまで維持する
      msgTimer = isAuto ? 180 : -1;
      msgCallback = callback;
      const box = document.getElementById('msgBox');
      box.style.display = 'block';
      // 手動送りの場合は▼を表示する
      box.innerText = text + (isAuto ? '' : '\n\n▼ [Space]');
    }

    function hideMsg() {
      msgText = '';
      msgTimer = 0;
      document.getElementById('msgBox').style.display = 'none';
      if (msgCallback) {
        const cb = msgCallback;
        msgCallback = null;
        cb();
      }
    }

    function triggerBadgeFanfare(badgeName, callback) {
      // フラッシュ演出を削除
      showMsg(`♪ ジャジャーン！\n『${badgeName}』を手に入れた！`, callback);
    }

    function triggerEncounter() {
      player.moving = false;
      gameState = 'frozen';
      // フラッシュ演出を削除し、すぐにバトルへ移行
      const fieldMonsters = monsters.filter(m => !m.isBoss);
      const mDef = fieldMonsters[Math.floor(Math.random() * fieldMonsters.length)];
      battle.monster = mDef;
      battle.curHp = mDef.maxHp;
      battle.cmdIndex = 0;
      battle.isBoss = false;

      gameState = 'battle_msg';
      showMsg(`${mDef.name} があらわれた！\n${mDef.msg}`, () => {
        gameState = 'battle_cmd';
      }, true); // エンカウントメッセージは自動送り

      stepsSinceEncounter = 0;
      nextEncounterSteps = Math.floor(Math.random() * 26) + 5;
    }

    function changeMap(newMapKey, x, y, customMsg = null) {
      currentMapKey = newMapKey;
      currentMap = maps[currentMapKey];
      player.x = x;
      player.y = y;

      if (customMsg) {
        showMsg(customMsg);
      } else if (currentMapKey === 'field') {
        showMsg('フィールドに出た。\n※ここから先はモンスターが出るぞ。');
        stepsSinceEncounter = 0;
        nextEncounterSteps = Math.floor(Math.random() * 26) + 5;
      } else if (currentMapKey === 'village') {
        showMsg('ハジメの村にやってきた。');
      } else if (currentMapKey === 'castle') {
        showMsg('王様の城にやってきた。');
      } else if (currentMapKey === 'port') {
        showMsg('ネムリの港町にやってきた。');
      } else {
        showMsg(newMapKey + 'に入った。');
      }
    }

    // ========== 当たり判定 ==========
    function isBlocked(x, y) {
      if (x < 0 || x >= currentMap.width || y < 0 || y >= currentMap.height) return true;
      const tile = currentMap.data[y][x];
      // 障害物タイルリスト (木、家、水、岩、森、山、海)
      // 魔王城の壁(27, 34)や室内壁も確実に追加
      if ([2, 3, 4, 6, 11, 12, 13, 27, 34, 36, 37, 38, 39, 40].includes(tile)) return true;
      for (const npc of currentMap.npcs) {
        if (npc.id === 'boss1' && flags.hajime_boss_defeated) continue;
        if (npc.id === 'boss2' && flags.nemuri_boss_defeated) continue;
        if (npc.id === 'boss3' && flags.forest_boss_defeated) continue;
        if (npc.id === 'boss4' && flags.desert_boss_defeated) continue;
        if (npc.id === 'boss5' && flags.snow_boss_defeated) continue;
        if (npc.id === 'boss6' && flags.cave_boss_defeated) continue;
        if (npc.id === 'boss7' && flags.shrine_boss_defeated) continue;
        if (npc.id === 'demon_king' && flags.demon_p1_defeated) continue;
        if (npc.id === 'dragon_king' && flags.demon_defeated) continue;
        if (npc.x === x && npc.y === y) return true;
      }
      return false;
    }

    // ========== システム機能 ==========
    function startBossBattle(bossDef, onWin) {
      battle.monster = bossDef;
      battle.curHp = bossDef.maxHp;
      battle.cmdIndex = 0;
      battle.onWin = onWin;
      battle.isBoss = true;

      gameState = 'battle_msg';
      showMsg(`ボスの ${bossDef.name} が立ちはだかった！\n${bossDef.msg}`, () => {
        gameState = 'battle_cmd';
      }, true); // ボス登場メッセージは自動送り
    }

    // ========== インタラクション ==========
    function interact() {
      const dirs = [[0, -1], [0, 1], [-1, 0], [1, 0]];
      const [dx, dy] = dirs[player.dir];
      // 看板・井戸用の本来の正面座標
      const origTx = player.x + dx;
      const origTy = player.y + dy;
      // NPC検索用の座標（カウンター越しを考慮）
      let tx = origTx;
      let ty = origTy;

      const findNPC = (targetX, targetY) => {
        return currentMap.npcs.find(npc => {
          if (npc.id === 'boss1' && flags.hajime_boss_defeated) return false;
          if (npc.id === 'boss2' && flags.nemuri_boss_defeated) return false;
          if (npc.id === 'boss3' && flags.forest_boss_defeated) return false;
          if (npc.id === 'boss4' && flags.desert_boss_defeated) return false;
          if (npc.id === 'boss5' && flags.snow_boss_defeated) return false;
          if (npc.id === 'boss6' && flags.cave_boss_defeated) return false;
          if (npc.id === 'boss7' && flags.shrine_boss_defeated) return false;
          if (npc.id === 'demon_king' && flags.demon_defeated) return false;
          return npc.x === targetX && npc.y === targetY;
        });
      };

      let targetNPC = findNPC(tx, ty);

      // カウンター（机タイル:37）越しに話しかけられるようにする
      if (!targetNPC && currentMap.data[ty] && currentMap.data[ty][tx] === 37) {
        tx += dx;
        ty += dy;
        targetNPC = findNPC(tx, ty);
      }

      if (targetNPC) {
        const npc = targetNPC;

        // 裏技：AI助手に3回連続で話しかける
        if (npc.id === 'ai') {
          flags.consecutiveAiTalks++;
          if (flags.consecutiveAiTalks === 3) {
            flags.consecutiveAiTalks = 0;
            player.badges = ['着手の証', '覚醒の証', '決断の証', '素直の証', '完了の証', '休息の証', '自責の証'];
            player.sincerity = 99;
            flags.hajime_cleared = flags.nemuri_cleared = flags.forest_cleared = flags.desert_cleared = flags.snow_cleared = flags.cave_cleared = flags.shrine_cleared = true;
            flags.hajime_cursed = flags.nemuri_cursed = flags.forest_cursed = flags.desert_cursed = flags.snow_cursed = flags.cave_cursed = flags.shrine_cursed = false;
            showMsg('AI助手「……えっ、3回も話しかけてくれるなんて！\n君の熱意に免じて、全ての証と特別な力を授けちゃうよ！\nこれで魔王城へ直行だね！」');
            return;
          }
        } else {
          flags.consecutiveAiTalks = 0;
        }
          // 王様の隠し要素
          if (npc.id === 'king') {
            if (player.badges.length === 7 && !flags.learned_final_skill) {
              showMsg('「おお、ジッケンよ！ 7つの証をすべて集めたか！！」', () => {
                const flash = document.getElementById('encounterFlash');
                flash.style.display = 'block';
                flash.style.background = 'gold';
                setTimeout(() => {
                  flash.style.display = 'none';
                  showMsg('「見事なり！ お前に王家に伝わる最終奥義…\n『真・正論パンチ』を伝承しよう！」\n\n（ジッケンは最終奥義を習得した！）\n（誠実性が100%になった！）', () => {
                    player.sincerity = 100;
                    flags.learned_final_skill = true;
                    gameState = 'explore';
                  });
                }, 500);
              });
              return;
            }
            if (player.badges.length >= 3) {
              showMsg('「おお、随分と誠実になったようじゃな！\n…実はワシ、王座に座りっぱなしで下半身はパジャマのままなんじゃ。\nオンライン公務の弊害じゃな。ガッハッハ！」');
            } else {
              showMsg(npc.msg);
            }
            return;
          }
          // ボス1：サボり魔
          if (npc.id === 'boss1') {
            showMsg(npc.getMsg(), () => {
              startBossBattle(monsters.find(m => m.name === 'サボり魔'), () => {
                flags.hajime_cursed = false;
                flags.hajime_boss_defeated = true;
                showMsg('サボり魔を退治した！\n村を覆っていた怠惰な空気が晴れていく！', () => {

                  // 新マップ「竜王の間」への出口を追加

    // ========== バトル進行の共通ロジック ==========
    function executeBattleTurn(actionType) {
      gameState = 'battle_msg';

      const enemyTurn = () => {
        if (battle.curHp <= 0) {
          const expGain = battle.monster.exp;
          player.exp += expGain;
          let levelUpMsg = '';
          if (player.exp >= player.nextExp) {
            player.level++;
            player.sincerity += 5;
            player.maxHp += 5;
            player.hp = player.maxHp;
            player.maxMp += 2;
            player.mp = player.maxMp;
            player.atk += 2;
            player.def += 1;
            player.spd += 1;
            player.nextExp = Math.floor(player.nextExp * 2.5);
            levelUpMsg = `\n\nジッケンのレベルが上がった！\n誠実性が ${player.sincerity}% になった！\n全ステータスがアップ！`;
          }
          showMsg(`${battle.monster.name}を倒した！\n${expGain}の経験値を獲得！${levelUpMsg}`, () => {
            if (battle.isBoss && battle.onWin) {
              battle.isBoss = false;
              battle.onWin();
            } else {
              gameState = 'explore';
            }
          });
        } else {
          const edmg = Math.max(1, Math.floor(Math.random() * 3) + battle.monster.atk - player.def);
          player.hp -= edmg;
          if (player.hp < 0) player.hp = 0;
          showMsg(`${battle.monster.name}の攻撃！\nジッケンは${edmg}のダメージを受けた！`, () => {
            if (player.hp <= 0) {
              player.hp = player.maxHp;
              player.mp = player.maxMp;
              showMsg('ジッケンは 心を折られてしまった…\n\n（目の前が真っ暗になった…）', () => {
                gameState = 'explore';
                changeMap('castle', 2, 4, '神父「おお ジッケンよ！死んでしまうとは情けない！\nもう一度、気を取り直して頑張るのじゃ！」');
              }, true);
            } else {
              gameState = 'battle_cmd';
            }
          }, true);
        }
      };

      const isPlayerFirst = (player.spd + Math.random() * 2) >= (battle.monster.spd + Math.random() * 2);

      const executePlayerAction = (onComplete) => {
        if (actionType === 0) { // たたかう
          const dmg = Math.max(1, Math.floor(Math.random() * 3) + player.atk - battle.monster.def);
          battle.curHp -= dmg;
          showMsg(`ジッケンの攻撃！\n${battle.monster.name}に${dmg}のダメージ！`, onComplete, true);
        } else if (actionType === 1) { // とくぎ
          const skill = battle.selectedSkill;
          player.mp -= skill.mp;
          if (skill.type === 'def') {
            player.def += skill.val;
            showMsg(`ジッケンは「${skill.name}」を使った！\n${skill.msg}\n（この戦闘中のみ防御が上がった！）`, onComplete, true);
          } else if (skill.type === 'atk' || skill.type === 'atk_spd') {
            let dmg = Math.max(1, Math.floor(Math.random() * 3) + skill.val + player.atk - battle.monster.def);
            if (skill.type === 'atk_spd') dmg += Math.floor(player.spd / 2);
            battle.curHp -= dmg;
            showMsg(`ジッケンは「${skill.name}」を使った！\n${skill.msg}\n\n${battle.monster.name}に ${dmg} のダメージ！`, onComplete, true);
          } else if (skill.type === 'healMp') {
            player.mp = Math.min(player.maxMp, player.mp + skill.val);
            showMsg(`ジッケンは「${skill.name}」を使った！\n${skill.msg}`, onComplete, true);
          }
        } else if (actionType === 2) { // どうぐ
          if (player.items.herb > 0) {
            player.items.herb--;
            const healHp = 30;
            player.hp = Math.min(player.maxHp, player.hp + healHp);
            showMsg(`ジッケンは「やくそう」を使った！\nHPが${healHp}回復した！\n(残り: ${player.items.herb}個)`, onComplete, true);
          } else if (player.items.coffee > 0) {
            player.items.coffee--;
            const healHp = 15;
            player.hp = Math.min(player.maxHp, player.hp + healHp);
            showMsg(`ジッケンは「コーヒー」を飲んだ！\nHPが${healHp}回復した！\n(残り: ${player.items.coffee}個)`, onComplete, true);
          } else {
            showMsg(`使えるどうぐがない！`, () => { gameState = 'battle_cmd'; }, true);
          }
        } else if (actionType === 3) { // にげる
          if (battle.isBoss) {
            showMsg('ボス戦からは逃げられない！', () => { gameState = 'battle_cmd'; }, true);
          } else {
            showMsg('ジッケンは 一目散に逃げ出した！🏃💨', () => { gameState = 'explore'; }, true);
          }
        }
      };

      const executeEnemyAction = (onComplete) => {
        if (battle.curHp <= 0) {
          onComplete(); return;
        }
        const edmg = Math.max(1, Math.floor(Math.random() * 3) + battle.monster.atk - player.def);
        player.hp -= edmg;
        if (player.hp < 0) player.hp = 0;
        showMsg(`${battle.monster.name}の攻撃！\nジッケンは${edmg}のダメージを受けた！`, () => {
          if (player.hp <= 0) {
            player.hp = player.maxHp;
            player.mp = player.maxMp;
            showMsg('ジッケンは 倒れてしまった…\n\n（目の前が真っ暗になった…）', () => {
              gameState = 'explore';
              changeMap('castle', 2, 4, '神父「おお、ジッケンよ！死んでしまうとは情けない！\nもう一度、気を取り直して頑張るのじゃ！」');
            }, true);
          } else {
            onComplete();
          }
        }, true);
      };

      if (actionType === 3) { // 逃げる場合は敵のターンは無し
        executePlayerAction(enemyTurn);
      } else {
        if (isPlayerFirst) {
          executePlayerAction(() => {
            if (battle.curHp > 0) {
              executeEnemyAction(() => { gameState = 'battle_cmd'; });
            } else {
              enemyTurn(); // 勝敗判定へ
            }
          });
        } else {
          executeEnemyAction(() => {
            if (player.hp > 0) {
              executePlayerAction(() => {
                if (battle.curHp <= 0) {
                  enemyTurn();
                } else {
                  gameState = 'battle_cmd';
                }
              });
            }
          });
        }
      }
    }

    // ========== 入力 ==========
    const keys = {};
    document.addEventListener('keydown', e => {
      keys[e.key] = true;

      // Sキーでスキル一覧を開く・閉じる
      if (e.key === 's' || e.key === 'S') {
        if (gameState === 'explore') {
          gameState = 'skills_menu';
          player.skillsScrollOffset = 0; // 開く時にリセット
        } else if (gameState === 'skills_menu') {
          gameState = 'explore';
        }
        return;
      }

      // スキルメニュー内でのスクロール
      if (gameState === 'skills_menu') {
        const skills = getSkills();
        if (e.key === 'ArrowUp') {
          player.skillsScrollOffset = Math.max(0, player.skillsScrollOffset - 1);
        }
        if (e.key === 'ArrowDown') {
          // 最大件数はとりあえず3件表示とする
          player.skillsScrollOffset = Math.min(Math.max(0, skills.length - 3), player.skillsScrollOffset + 1);
        }
        if (['ArrowUp', 'ArrowDown'].includes(e.key)) e.preventDefault();
      }

      if (gameState === 'quiz') {
        const count = quiz.choices.length;
        if (e.key === 'ArrowUp') { quiz.index = (quiz.index - 1 + count) % count; }
        if (e.key === 'ArrowDown') { quiz.index = (quiz.index + 1) % count; }
        if (e.key === ' ') {
          const ans = quiz.index;
          gameState = 'explore';
          if (ans === quiz.correctIdx) quiz.onCorrect();
          else quiz.onWrong();
        }
        if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', ' '].includes(e.key)) e.preventDefault();
        return;
      }

      // バトル中のコマンド入力
      if (gameState === 'battle_cmd') {
        const cmdCount = 4; // 'じゅもん'削除
        if (e.key === 'ArrowUp') { battle.cmdIndex = (battle.cmdIndex - 1 + cmdCount) % cmdCount; }
        if (e.key === 'ArrowDown') { battle.cmdIndex = (battle.cmdIndex + 1) % cmdCount; }

        if (e.key === ' ') {
          if (battle.cmdIndex === 1) { // とくぎ
            battle.skillIndex = 0;
            gameState = 'battle_skill';
            return;
          }
          executeBattleTurn(battle.cmdIndex); // たたかう、どうぐ、にげる
        }
        if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', ' '].includes(e.key)) e.preventDefault();
        return;
      } else if (gameState === 'battle_skill') {
        const skills = getSkills();
        const count = skills.length + 1; // +1は「もどる」
        if (e.key === 'ArrowUp') { battle.skillIndex = (battle.skillIndex - 1 + count) % count; }
        if (e.key === 'ArrowDown') { battle.skillIndex = (battle.skillIndex + 1) % count; }
        if (e.key === 'Escape' || e.key === 's' || e.key === 'S') { gameState = 'battle_cmd'; return; }

        if (e.key === ' ') {
          if (battle.skillIndex === skills.length) { // もどる
            gameState = 'battle_cmd';
            return;
          }
          const skill = skills[battle.skillIndex];
          if (player.mp < skill.mp) {
            showMsg('MPが足りない！', () => { gameState = 'battle_skill'; }, true);
            return;
          }
          battle.selectedSkill = skill;
          executeBattleTurn(1); // 1 = とくぎ扱い
        }
        if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', ' '].includes(e.key)) e.preventDefault();
        return;
      }

      // フィールド時の入力
      if (e.key === ' ') {
        if (msgTimer !== 0) hideMsg();
        else if (gameState === 'explore') interact();
      }
      if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', ' '].includes(e.key)) e.preventDefault();
    });
    document.addEventListener('keyup', e => { keys[e.key] = false; });

    // スマホ用タッチイベントの設定
    document.querySelectorAll('#mobileControls [data-key]').forEach(btn => {
      btn.addEventListener('touchstart', (e) => {
        e.preventDefault(); // 画面のスクロールやズームを防ぐ
        btn.style.opacity = '0.5';
        const key = btn.getAttribute('data-key');
        if (key === ' ' && document.getElementById('title').style.display !== 'none') {
           startGame();
           return;
        }
        document.dispatchEvent(new KeyboardEvent('keydown', { key: key, bubbles: true }));
      });
      btn.addEventListener('touchend', (e) => {
        e.preventDefault();
        btn.style.opacity = '1';
        const key = btn.getAttribute('data-key');
        document.dispatchEvent(new KeyboardEvent('keyup', { key: key, bubbles: true }));
      });
    });

    // ========== 移動制御 ==========
    let moveCD = 0;
    function handleMovement() {
      if (moveCD > 0) { moveCD--; return; }

      let moved = false;
      let nextX = player.x;
      let nextY = player.y;

      if (keys['ArrowUp']) { player.dir = 0; nextY--; moved = true; }
      else if (keys['ArrowDown']) { player.dir = 1; nextY++; moved = true; }
      else if (keys['ArrowLeft']) { player.dir = 2; nextX--; moved = true; }
      else if (keys['ArrowRight']) { player.dir = 3; nextX++; moved = true; }

      if (moved) {
        player.moving = true;
        // Shiftキーで移動ウェイトを半分にする（ダッシュ）
        moveCD = keys['Shift'] ? 4 : 8;

        if (!isBlocked(nextX, nextY)) {
          player.x = nextX;
          player.y = nextY;

          // マップ移動チェック
          const key = player.x + ',' + player.y;
          if (currentMap.exits[key]) {
            const exit = currentMap.exits[key];
            changeMap(exit.dest, exit.x, exit.y);
            return; // 移動したフレームはここまで
          }

          // フィールドエンカウント判定
          if (currentMap.isField) {
            stepsSinceEncounter++;
            if (stepsSinceEncounter >= nextEncounterSteps) {
              triggerEncounter();
            }
          }
        }
      } else {
        player.moving = false;
      }
    }

    // ========== メインループ ==========
    function gameLoop() {
      if (!gameStarted) { requestAnimationFrame(gameLoop); return; }

      if (msgTimer > 0) {
        msgTimer--;
        if (msgTimer === 0) hideMsg();
      }

      if (gameState === 'explore' && msgTimer === 0) {
        handleMovement();
      }

      if (gameState === 'explore' || gameState === 'frozen') {
        // カメラ計算 (プレイヤーが画面中央にくるように)
        let camX = Math.floor(player.x - VIEW_COLS / 2);
        let camY = Math.floor(player.y - VIEW_ROWS / 2);

        // カメラをマップの端で止める
        camX = Math.max(0, Math.min(camX, currentMap.width - VIEW_COLS));
        camY = Math.max(0, Math.min(camY, currentMap.height - VIEW_ROWS));

        // フィールドマップ時の橋かけるギミック（証を7つ集めると魔王城への橋がかかる）
        if (currentMapKey === 'field') {
          if (player.badges.length >= 7) {
            maps.field.data[4][33] = 19; // 魔王城の前(水)を橋(道)に変える
            maps.field.data[5][33] = 19;
            maps.field.data[6][33] = 19;
          }
        }

        // ループ内で現在のマップを描画
        for (let y = 0; y < VIEW_ROWS; y++) {
          for (let x = 0; x < VIEW_COLS; x++) {
            const mapX = camX + x;
            const mapY = camY + y;
            const tile = (mapX >= 0 && mapX < currentMap.width && mapY >= 0 && mapY < currentMap.height)
              ? currentMap.data[mapY][mapX] : -1;
            drawTile(mapX, mapY, x, y, tile);
          }
        }

        // NPC描画
        currentMap.npcs.forEach(npc => {
          const dx = npc.x - camX;
          const dy = npc.y - camY;
          if (dx >= 0 && dx < VIEW_COLS && dy >= 0 && dy < VIEW_ROWS) {
            drawNPC(npc, dx, dy);
          }
        });

        // プレイヤー描画
        drawPlayer(player.x - camX, player.y - camY);
      } else if (gameState === 'quiz') {
        ctx.fillStyle = 'rgba(0,0,0,0.85)'; ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = 'rgba(0,0,40,0.92)'; ctx.fillRect(80, 100, 480, 240);
        ctx.strokeStyle = '#fff'; ctx.lineWidth = 3; ctx.strokeRect(80, 100, 480, 240);
        ctx.fillStyle = '#fff'; ctx.font = '22px monospace'; ctx.textAlign = 'left';

        quiz.choices.forEach((c, i) => {
          ctx.fillText(c, 130, 160 + i * 50);
        });
        ctx.fillText('▶', 100, 160 + quiz.index * 50);

      } else if (gameState.startsWith('battle')) {
        // バトル画面描画 (黒背景+枠)
        ctx.fillStyle = '#000'; ctx.fillRect(0, 0, canvas.width, canvas.height);

        if (battle.monster && battle.monster.img.complete) {
          // 背景透過処理を適用したCanvasを取得し、全体表示（見切れ防止）を行う
          const renderImg = makeTransparent(battle.monster.img);

          const sw = renderImg.width;
          const sh = renderImg.height; // 切り取らずに全体を使う

          const w = 260;
          const h = 260 * (sh / sw) || 260;
          const bounce = Math.sin(Date.now() / 300) * 4;
          ctx.drawImage(renderImg, 0, 0, sw, sh, (canvas.width - w) / 2, 60 + bounce, w, h);
        }

        if (gameState === 'battle_cmd' || gameState === 'battle_skill') {
          // コマンドウィンドウ
          ctx.fillStyle = 'rgba(0,0,40,0.92)';
          ctx.fillRect(40, 300, 180, 140);
          ctx.strokeStyle = '#fff'; ctx.lineWidth = 3;
          ctx.strokeRect(40, 300, 180, 140);

          ctx.fillStyle = '#fff';
          ctx.font = '20px monospace'; ctx.textAlign = 'left';
          const cmds = ['たたかう', 'とくぎ', 'どうぐ', 'にげる'];
          cmds.forEach((cmd, i) => {
            ctx.fillText(cmd, 80, 335 + i * 30);
          });

          // カーソル
          if (gameState === 'battle_cmd') {
            ctx.fillText('▶', 50, 335 + battle.cmdIndex * 30);
          }

          // 特技ウィンドウのインライン描画
          if (gameState === 'battle_skill') {
            ctx.fillStyle = 'rgba(0,40,40,0.95)';
            ctx.fillRect(240, 160, 340, 280);
            ctx.strokeStyle = '#fff'; ctx.lineWidth = 3;
            ctx.strokeRect(240, 160, 340, 280);

            ctx.fillStyle = '#fff';
            ctx.font = '20px monospace';
            const skills = getSkills();

            skills.forEach((skill, i) => {
              ctx.fillStyle = (player.mp >= skill.mp) ? '#fff' : '#666';
              ctx.fillText(skill.name, 280, 200 + i * 35);
              ctx.textAlign = 'right';
              ctx.fillText(skill.mp, 550, 200 + i * 35);
              ctx.textAlign = 'left';
            });

            // もどる
            ctx.fillStyle = '#fff';
            ctx.fillText('もどる', 280, 200 + skills.length * 35);

            // カーソル
            ctx.fillText('▶', 250, 200 + battle.skillIndex * 35);
          }
        }
      } else if (gameState === 'skills_menu') {
        ctx.fillStyle = 'rgba(0,0,0,0.85)'; ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = 'rgba(0,40,40,0.92)'; ctx.fillRect(40, 40, 560, 400);
        ctx.strokeStyle = '#fff'; ctx.lineWidth = 3; ctx.strokeRect(40, 40, 560, 400);

        ctx.fillStyle = '#fff'; ctx.font = '24px monospace'; ctx.textAlign = 'center';
        ctx.fillText('【とくぎ・アクション一覧】', canvas.width / 2, 80);

        ctx.font = '16px monospace'; ctx.textAlign = 'left';
        let yPos = 130;

        ctx.fillStyle = '#aaa';
        ctx.fillText('※誠実性に応じて使える技が増えたり進化します', 60, yPos); yPos += 30;
        ctx.fillText(`現在の誠実性: ${player.sincerity}%`, 60, yPos); yPos += 40;

        ctx.fillStyle = '#fff';
        ctx.fillText('・とくぎ: 正論パンチ (MP3 / 敵に大ダメージ)', 60, yPos); yPos += 40;

        ctx.fillStyle = '#ffd700';
        ctx.fillText('・アクション: ダッシュ (Shiftキー / 移動速度UP)', 60, yPos); yPos += 40;

        ctx.fillStyle = '#aaafff';
        ctx.fillText('▼ 現在のとくぎ (上下キーでスクロール) ▼', 60, yPos); yPos += 30;

        const skills = getSkills();
        
        // スクロールインジケーター（上）
        if (player.skillsScrollOffset > 0) {
          ctx.fillStyle = '#ffd700'; ctx.fillText('▲ もっと見る', 280, yPos - 5);
        }
        
        // 常に3つ表示するように制限（見切れないように）
        const visibleSkills = skills.slice(player.skillsScrollOffset, player.skillsScrollOffset + 3);
        
        visibleSkills.forEach(skill => {
          ctx.fillStyle = '#fff';
          ctx.fillText(`・${skill.name} (MP${skill.mp})`, 80, yPos); yPos += 24;
          ctx.fillStyle = '#aaa';
          ctx.fillText(`  効果: ${skill.msg.replace(/\n/g, ' ')}`, 80, yPos); yPos += 34;
        });

        // スクロールインジケーター（下）
        if (player.skillsScrollOffset + 3 < skills.length) {
          ctx.fillStyle = '#ffd700'; ctx.fillText('▼ もっと見る', 280, yPos - 5);
        }

        ctx.fillStyle = '#ffd700'; ctx.textAlign = 'center';
        ctx.fillText('Sキーで戻る', canvas.width / 2, 410);
      }

      // UI (ステータスバーをPS風にリッチ化)
      // 黒背景＋ゴールドフレーム
      ctx.fillStyle = '#0a0a1a'; ctx.fillRect(0, 0, 520, 32);
      ctx.strokeStyle = '#b8860b'; ctx.lineWidth = 2; ctx.strokeRect(0, 0, 520, 32);

      ctx.fillStyle = '#ffd700'; ctx.font = '14px monospace'; ctx.textAlign = 'left';
      ctx.fillText(`Lv.${player.level} ジッケン`, 8, 20);

      // HP/MPバー
      ctx.fillStyle = '#fff'; ctx.fillText('HP', 120, 20);
      ctx.fillStyle = '#440000'; ctx.fillRect(145, 8, 80, 14);
      ctx.fillStyle = '#ff3333'; ctx.fillRect(145, 8, Math.max(0, 80 * (player.hp / player.maxHp)), 14);
      ctx.fillStyle = '#fff'; ctx.font = '12px monospace'; ctx.fillText(`${player.hp}/${player.maxHp}`, 150, 20);

      ctx.fillStyle = '#fff'; ctx.font = '14px monospace'; ctx.fillText('MP', 240, 20);
      ctx.fillStyle = '#000044'; ctx.fillRect(265, 8, 60, 14);
      ctx.fillStyle = '#3366ff'; ctx.fillRect(265, 8, Math.max(0, 60 * (player.mp / player.maxMp)), 14);
      ctx.fillStyle = '#fff'; ctx.font = '12px monospace'; ctx.fillText(`${player.mp}/${player.maxMp}`, 270, 20);

      ctx.fillStyle = '#ffd700'; ctx.font = '14px monospace'; ctx.fillText(`誠実性:${player.sincerity}%`, 340, 20);

      // 証の数
      ctx.fillText(`証:${player.badges.length}/7`, 440, 20);

      // マップ名表示 (右上)
      let mapName = 'フィールド';
      if (currentMapKey === 'village') mapName = 'ハジメの村';
      if (currentMapKey === 'castle') mapName = 'ハジメの城';
      if (currentMapKey === 'port') mapName = 'ネムリの港町';
      if (currentMapKey === 'forest') mapName = 'マヨイの森';
      if (currentMapKey === 'desert') mapName = 'ナマケの砂漠';
      if (currentMapKey === 'snow') mapName = 'カンペキの雪山';
      if (currentMapKey === 'cave') mapName = 'ヨフカシの洞窟';
      if (currentMapKey === 'shrine') mapName = 'イイワケの祠';
      if (currentMapKey === 'demon_castle') mapName = '魔王の城';

      ctx.fillStyle = '#0a0a1a'; ctx.fillRect(520, 0, 120, 32);
      ctx.strokeStyle = '#b8860b'; ctx.strokeRect(520, 0, 120, 32);
      ctx.fillStyle = '#fff'; ctx.textAlign = 'center'; ctx.fillText(mapName, 580, 20);

      // 操作ガイド表示 (右下)
      if (gameState === 'explore') {
        ctx.fillStyle = 'rgba(255,255,255,0.5)';
        ctx.font = '12px monospace'; ctx.textAlign = 'right';
        ctx.fillText('Sキー: メニューを開く', canvas.width - 10, canvas.height - 10);
      }

      requestAnimationFrame(gameLoop);
    }

    function startGame() {
      document.getElementById('title').style.display = 'none';
      gameStarted = true;
      showMsg('ここはハジメの城。\n王様に話しかけてみよう。');
    }

    gameLoop();
  </script>
</body>

</html>
